name: Pipeline de ML

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Descomentar para activar el reentrenamiento semanal automático:
  # schedule:
  #   - cron: '0 3 * * 0'    # domingos a las 3 AM UTC

# Permisos necesarios para que el bot pueda hacer push a docs/
permissions:
  contents: write

jobs:
  # -------------------------------------------------------
  # JOB 1: Linting y tests
  # -------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Linting con flake8
        run: flake8 src/ tests/ --max-line-length=100

      - name: Tests con pytest
        run: pytest tests/ -v

  # -------------------------------------------------------
  # JOB 2: Entrenamiento, evaluación y publicación
  # Solo corre si los tests pasan
  # -------------------------------------------------------
  entrenar-y-publicar:
    runs-on: ubuntu-latest
    needs: test

    # Solo publicar en Pages cuando se hace push a main
    # (no en pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          # Necesitamos fetch-depth: 0 para que el bot pueda hacer push
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Entrenar modelo
        run: python src/train.py --config config/config.yaml
        # Si tu proyecto usara credenciales reales, las leerías así:
        # env:
        #   DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        #   HF_TOKEN:    ${{ secrets.HF_TOKEN }}

      - name: Evaluar modelo
        run: python src/evaluate.py --config config/config.yaml

      - name: Generar reporte HTML
        run: python src/generate_report.py --config config/config.yaml

      - name: Guardar artefactos del pipeline
        uses: actions/upload-artifact@v4
        with:
          name: resultados-${{ github.run_number }}
          path: |
            outputs/metrics.json
            outputs/report.html
            outputs/model.pkl
          retention-days: 30

      - name: Publicar reporte en GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Solo hacer commit si hay cambios en docs/
          git diff --staged --quiet || \
            git commit -m "chore: actualizar reporte de métricas [skip ci]"
          git push